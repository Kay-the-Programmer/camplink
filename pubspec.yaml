name: camplink
description: "Mulungushi University Campus Shopping App."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # HTTP client
  http: ^1.2.2

  # Secure token storage
  shared_preferences: ^2.3.2

  # Icons
  material_symbols_icons: ^4.0.0

  # Utilities
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.5.1
  cached_network_image: ^3.4.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Push notifications (Firebase Cloud Messaging)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
